<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A Flask-based Conjugate Gradient numerical methods calculator with worked examples, step-by-step iterations, and convergence plotting.">
    <title>{% block title %}Numerical Methods Calculator{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [["\\(", "\\)"]],
                displayMath: [["\\[", "\\]"]]
            }
        };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div class="ambient-background" aria-hidden="true"></div>
    <header class="site-header">
        <nav class="site-nav">
            <a class="{% if request.path == '/' %}active{% endif %}" href="/">Home</a>
            <a class="{% if request.path == '/conjugate-gradient' %}active{% endif %}" href="/conjugate-gradient">Method</a>
            <a href="/conjugate-gradient?section=calculator">Calculator</a>
            <a href="/conjugate-gradient?section=formula">Formula</a>
            <a href="/conjugate-gradient?section=examples">Examples</a>
        </nav>
    </header>

    <main class="page" id="main-content">
        {% block content %}
        {% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="{{ url_for('static', filename='js/site_navigation.js') }}"></script>
    <script src="{{ url_for('static', filename='js/site_motion.js') }}"></script>
    {% block scripts %}
    {% endblock %}
</body>
</html>
